image:
  repository: ghcr.io/your-github-user/jellyfin-cache
  tag: ""   # defaults to .Chart.AppVersion
  pullPolicy: Always

# ---------------------------------------------------------------------------
# rclone configuration
#
# Option A (recommended): create the secret out-of-band and reference it here.
#   kubectl create secret generic my-rclone \
#     --from-file=rclone.conf=$HOME/.config/rclone/rclone.conf
#
# Option B: paste the raw rclone.conf content below (use a sealed-secret /
#   external-secrets operator to avoid committing credentials).
# ---------------------------------------------------------------------------
rclone:
  # Name of an existing Secret with key "rclone.conf".
  # When set, rclone.configContent is ignored.
  existingSecret: ""

  # Raw rclone.conf content.  Only used when existingSecret is empty.
  # WARNING: do not commit real credentials; use a secrets manager.
  configContent: ""

# ---------------------------------------------------------------------------
# Source remotes (rclone remote paths)
# ---------------------------------------------------------------------------
remotes:
  - name: primary
    rclonePath: "storagebox-media:"
    priority: 0
    readOnly: true
    passthrough: false  # set true to bypass caching entirely for this remote

# ---------------------------------------------------------------------------
# Cache settings
# ---------------------------------------------------------------------------
cache:
  maxSize: "200GB"
  prefixBytes: 52428800        # 50 MiB
  playbackTriggerBytes: 5242880  # 5 MiB
  minPlayDuration: "10s"
  fullTTL: "72h"
  uploadTTL: "336h"
  trickplaySeekThreshold: 3
  trickplaySeekWindow: "10s"
  prefetchWorkers: 4
  downloadWorkers: 2
  evictInterval: "5m"

# ---------------------------------------------------------------------------
# Mount — choose one transport for the virtual filesystem
#
#   nfs  – NFS v3 over TCP; no kernel module needed on server side; hostPort
#           required on k3s/clusters where kube-proxy doesn't reach host netns.
#   9p   – 9P2000.L over TCP; no portmapper/lockd; recommended with the CSI
#           driver (csi: section below). Requires 9p kernel module on nodes.
#   fuse – local FUSE mount; requires privileged container.
# ---------------------------------------------------------------------------
mount:
  type: nfs
  # FUSE mount path (only used when type=fuse; requires privileged container)
  path: /mnt/jellyfin-cache
  # NFS listen address (only used when type=nfs)
  nfsListen: "0.0.0.0:2049"
  # 9P listen address (only used when type=9p)
  p9Listen: "0.0.0.0:5640"
  allowOther: false

# Expose the NFS port directly on the node so kubelet can mount it via hostPort.
# Required when the cluster's kube-proxy does not route ClusterIP traffic from
# the host network namespace (common in k3s).
nfs:
  hostPort: false

# ---------------------------------------------------------------------------
# CSI driver — mounts the cache server into pods via Kubernetes-native
# volume plumbing. No NFS PV/PVC or hostPort required in the pod spec.
#
# The CSI driver supports two protocols via volumeAttributes.protocol:
#   nfs (default) — requires mount.type=nfs on the daemon; NFS kernel module
#                   is present on virtually all Linux nodes.
#   9p            — requires mount.type=9p on the daemon; needs the 9p/9pnet/
#                   9pnet_tcp kernel modules (modprobe 9p 9pnet 9pnet_tcp).
#
# Usage in a Jellyfin pod spec:
#   volumes:
#   - name: media
#     csi:
#       driver: jellyfin-cache.csi.io
#       volumeAttributes:
#         server: jellyfin-cache.jellyfin.svc.cluster.local
#         # protocol: nfs    # optional — nfs is the default
#         # port: "2049"     # optional — defaults to 2049 (nfs) or 5640 (9p)
# ---------------------------------------------------------------------------
csi:
  enabled: false
  driverName: jellyfin-cache.csi.io
  nodeDriverRegistrar:
    image: registry.k8s.io/sig-storage/csi-node-driver-registrar
    tag: v2.10.1
  resources:
    requests:
      cpu: 10m
      memory: 20Mi
    limits:
      cpu: 100m
      memory: 64Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Optional Jellyfin webhook
# ---------------------------------------------------------------------------
webhook:
  enabled: false
  listen: "0.0.0.0:8089"
  httpPath: "/webhook"
  secret: ""
  pathField: "Path"
  stripPrefix: ""
  events:
    - "PlaybackStart"

# ---------------------------------------------------------------------------
# Optional storage-location API
# ---------------------------------------------------------------------------
api:
  enabled: false
  listen: "0.0.0.0:8090"
  secret: ""
  adminSecret: ""

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log:
  level: info   # debug | info | warn | error

# ---------------------------------------------------------------------------
# Persistent storage for the cache
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  size: 200Gi
  storageClass: ""   # leave empty to use cluster default
  accessMode: ReadWriteOnce
  existingClaim: ""  # use a pre-existing PVC instead of creating one

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP

# ---------------------------------------------------------------------------
# Kubernetes resource settings
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 2Gi

nodeSelector: {}
tolerations: []
affinity: {}

# Required when mount.type=fuse
podSecurityContext: {}
containerSecurityContext: {}
  # For FUSE uncomment:
  # privileged: true
