# This file MUST be SOPS-encrypted before committing.
#
# 1. Fill in your real rclone.conf content below.
# 2. Encrypt in-place:
#      sops --encrypt --in-place flux/jellyfin/rclone-secret.sops.yaml
# 3. Verify it's encrypted (should see "sops:" key at the bottom), then commit.
#
# To edit later:
#      sops flux/jellyfin/rclone-secret.sops.yaml
#
# Requires flux/.sops.yaml to have your age public key, and the matching
# private key loaded in the cluster as the secret "sops-age" in flux-system.
apiVersion: v1
kind: Secret
metadata:
  name: jellyfin-cache-rclone
  namespace: jellyfin
type: Opaque
stringData:
  rclone.conf: |
    [storagebox-media]
    type = sftp
    host = your-storage-host.example.com
    user = your-username
    pass = your-rclone-obscured-password
    # Add any other rclone remote sections here
